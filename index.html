<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>추구미즘 — 나의 추구미 찾기</title>
<style>
:root{--ink:#2B2233;--sub:#6E6478;--bg:#FAF7FB;--accent:#B76BA3;--deep:#4A2B5C;--line:#E4DCE9;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard',-apple-system,'Malgun Gothic',sans-serif;}
body{background:var(--bg);color:var(--ink);min-height:100vh;}
.wrap{max-width:480px;margin:0 auto;padding:20px 16px 40px;}
.progress{position:sticky;top:0;background:var(--bg);padding:12px 0 8px;z-index:10;}
.pbar{height:6px;background:var(--line);border-radius:3px;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,#F2A9C4,#B76BA3,#4A2B5C);border-radius:3px;transition:width .3s;}
.pnum{font-size:12px;color:var(--sub);text-align:right;margin-top:4px;}
.card{background:#fff;border-radius:16px;padding:24px 20px;box-shadow:0 4px 16px rgba(58,43,69,.08);margin-top:12px;}
h1{font-size:26px;line-height:1.3;} h2{font-size:20px;line-height:1.4;margin-bottom:6px;}
.q-part{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.05em;margin-bottom:8px;}
.q-sub{font-size:13px;color:var(--sub);margin-bottom:16px;line-height:1.5;}
.opt{display:block;width:100%;text-align:left;background:var(--bg);border:2px solid transparent;border-radius:12px;padding:14px 16px;margin-bottom:10px;font-size:15px;line-height:1.45;cursor:pointer;transition:all .15s;color:var(--ink);}
.opt:active{transform:scale(.98);} .opt.sel{border-color:var(--accent);background:#F7EBF4;font-weight:600;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.chipgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.chip-item{background:var(--bg);border:2px solid transparent;border-radius:10px;padding:11px 12px;font-size:13.5px;line-height:1.35;cursor:pointer;text-align:center;color:var(--ink);}
.chip-item.sel{border-color:var(--accent);background:#F7EBF4;font-weight:700;}
.mood{aspect-ratio:1;border-radius:12px;border:3px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:2px;font-size:11px;font-weight:600;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5);padding:8px 6px;text-align:center;line-height:1.3;transition:all .15s;background-size:cover;background-position:center;position:relative;overflow:hidden;}
.mood::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.38),transparent 55%);pointer-events:none;}
.mood>*{position:relative;z-index:1;}
.mood.sel{border-color:var(--deep);transform:scale(.95);box-shadow:0 0 0 2px #fff inset;}
.mood.hasimg .em{display:none;}
.mood .em{font-size:22px;text-shadow:none;margin-bottom:auto;margin-top:auto;}
.btn{display:block;width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;margin-top:16px;}
.btn:disabled{opacity:.35;} .btn.ghost{background:transparent;color:var(--sub);font-weight:500;font-size:13px;padding:10px;}
.nav-row{display:flex;gap:8px;margin-top:16px;}
.btn.back{flex:0 0 88px;background:var(--line);color:var(--ink);font-weight:600;margin-top:0;}
.nav-row .btn{margin-top:0;flex:1;}
.break-card{text-align:center;padding:40px 20px;}
.break-card .em{font-size:40px;margin-bottom:12px;}
.gender-row{display:flex;gap:10px;margin-top:18px;}
.gender-row button{flex:1;background:var(--bg);border:2px solid var(--line);border-radius:14px;padding:22px 10px;font-size:16px;font-weight:700;cursor:pointer;color:var(--ink);}
.gender-row button.sel{border-color:var(--accent);background:#F7EBF4;}
.result-type{border-radius:16px;padding:28px 20px;text-align:center;color:#fff;margin:14px 0;}
.result-type h2{font-size:30px;} .result-type .pc{font-size:13px;opacity:.9;margin-top:4px;}
.tag{display:inline-block;background:rgba(255,255,255,.25);border-radius:20px;padding:4px 12px;font-size:12px;margin-top:10px;}
.sec{margin-top:18px;} .sec h3{font-size:15px;color:var(--accent);margin-bottom:8px;}
.sec p{font-size:14px;line-height:1.7;color:var(--ink);}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;}
.bar-row .nm{width:64px;color:var(--sub);} .bar-bg{flex:1;height:8px;background:var(--line);border-radius:4px;overflow:hidden;}
.bar-fg{height:100%;border-radius:4px;}
.fb{display:flex;gap:10px;margin-top:14px;}
.fb button{flex:1;background:var(--bg);border:2px solid var(--line);border-radius:12px;padding:12px;font-size:14px;cursor:pointer;}
.fb button.sel{border-color:var(--accent);background:#F7EBF4;font-weight:700;}
.eye-svg{width:100%;height:64px;margin-bottom:6px;}
.small{font-size:11px;color:var(--sub);margin-top:14px;text-align:center;line-height:1.6;}
textarea{width:100%;border:2px solid var(--line);border-radius:12px;padding:12px;font-size:14px;min-height:70px;margin-top:8px;font-family:inherit;}
.hidden{display:none;}
</style>
</head>

function prog(){
  const answered=Q.filter((q,i)=>q.id&&i<idx&&answers[q.id]!==undefined).length;
  const total=totalQ+(phase==="extra"?extraQ.length:0);
  $("prog").classList.remove("hidden");
  $("pfill").style.width=Math.min(100,Math.round(answered/total*100))+"%";
  $("pnum").textContent=`${Math.min(answered+1,total)} / ${total}`;
}
function canGoBack(){ // 이전으로 갈 수 있는 위치인지 (첫 문항 전엔 불가)
  for(let i=idx-1;i>=0;i--){ if(Q[i]&&Q[i].id) return true; }
  return false;
}
function goBack(){
  const cur=Q[idx];
  track("question_back",{from:cur&&cur.id?cur.id:"intro"});
  for(let i=idx-1;i>=0;i--){ if(Q[i]&&Q[i].id){ idx=i; render(); return; } }
}
function navRow(nextDisabled,nextLabel){
  const back=canGoBack()?`<button class="btn back" onclick="goBack()">← 이전</button>`:"";
  return `<div class="nav-row">${back}<button class="btn" id="nextBtn" ${nextDisabled?"disabled":""} onclick="next()">${nextLabel||"다음"}</button></div>`;
}
function renderQ(){
  const q=Q[idx];
  if(!q){ prepExtra(); return; }
  if(q.intro){
    $("prog").classList.add("hidden");
    app.innerHTML=`<div class="card break-card"><div class="em">${q.part==="A"?"💫":q.part==="B"?"👀":"🙌"}</div>
     <p style="font-size:16px;line-height:1.8">${q.intro}</p>
     <button class="btn" onclick="next()">계속하기</button></div>`;
    return;
  }
  prog();
  qShownAt = Date.now();
  const opts=qOpts(q);
  let html=`<div class="card"><div class="q-part">${q.part==="A"?"PART A · 되고 싶은 나":q.part==="B"?"PART B · 지금의 나":q.part==="C"?"PART C · 나의 태도":"PART D · 마무리"}</div>
  <h2>${g(qTxt(q))}</h2>`;
  if(q.multi&&q.kind!=="chips") html+=`<div class="q-sub">${q.max?`최대 ${q.max}개까지`:"여러 개 골라도 좋아요"}</div>`;
  const hasSel = q.multi ? (answers[q.id]||[]).length>0 : answers[q.id]!==undefined;
  if(q.kind==="mood"){
    html+=`<div class="grid">`;
    MOODS[q.set].forEach((m,i)=>{
      const sel=(answers[q.id]||[]).includes(i)?" sel":"";
      html+=`<div class="mood${sel}" id="md_${q.id}_${i}" style="background:linear-gradient(135deg,${TYPES[m[0]].color},${shade(TYPES[m[0]].color)})" onclick="pickMood('${q.id}',${i})"><span class="em">${m[1]}</span><span>${m[2]}</span></div>`;
      const key=`${q.set}_${m[0]}`;
      if(IMGDATA[key]){ setTimeout(()=>{const el=document.getElementById(`md_${q.id}_${i}`); if(el){el.style.backgroundImage=`url(${IMGDATA[key]})`; el.classList.add("hasimg");}},0); }
    });
    html+=`</div>`+navRow(!hasSel);
  } else if(q.kind==="chips"){
    html+=`<div class="chipgrid">`;
    opts.forEach((o,i)=>{
      const sel=(answers[q.id]||[]).includes(i)?" sel":"";
      html+=`<div class="chip-item${sel}" onclick="pick('${q.id}',${i})">${o.t}</div>`;
    });
    html+=`</div>`+navRow(!hasSel);
  } else {
    opts.forEach((o,i)=>{
      const sel=q.multi ? (answers[q.id]||[]).includes(i) : answers[q.id]===i;
      html+=`<button class="opt${sel?" sel":""}" onclick="pick('${q.id}',${i})">${o.svg?SVGEYES[o.svg]:""}${g(o.t)}</button>`;
    });
    html+= q.multi ? navRow(!hasSel) : (canGoBack()?`<div class="nav-row"><button class="btn back" onclick="goBack()">← 이전</button><button class="btn" ${answers[q.id]===undefined?"disabled":""} onclick="next()">다음</button></div>`:"");
  }
  html+=`</div>`;
  app.innerHTML=html;
}
function shade(hex){const n=parseInt(hex.slice(1),16),r=(n>>16)*0.75|0,g2=((n>>8)&255)*0.75|0,b=(n&255)*0.75|0;return `rgb(${r},${g2},${b})`;}
function pickMood(id,i){
  answers[id]=answers[id]||[];
  const a=answers[id],p=a.indexOf(i);
  p>=0?a.splice(p,1):a.push(i);
  renderQ();
}
let lastTracked = {};
function trackAnswer(id){
  const ms = qShownAt ? (Date.now()-qShownAt) : null;
  track("question_answered",{qid:id, value:answers[id], ms});
}
function pick(id,i){
  const q=Q.find(x=>x.id===id);
  if(q.multi){
    answers[id]=answers[id]||[];
    const a=answers[id],p=a.indexOf(i);
    if(p>=0)a.splice(p,1); else if(!q.max||a.length<q.max)a.push(i);
    renderQ();
  } else {
    answers[id]=i;
    renderQ(); // 선택 표시 + 이전/다음 버튼 노출 (자동 진행 대신, 되돌아보기 가능하게)
    setTimeout(()=>{ if(answers[id]===i&&Q[idx]&&Q[idx].id===id) next(); },320);
  }
}
function next(){
  const q=Q[idx];
  if(q && q.id && answers[q.id]!==undefined) trackAnswer(q.id);
  idx++; render();
}
function scoreAll(){
  TKEYS.forEach(k=>{scoreWant[k]=0;scoreHave[k]=0;});
  Object.keys(axisWant).forEach(k=>axisWant[k]=0);
  axisHave.warm=0;axisHave.cool=0;
  Q.forEach(q=>{
    if(!q.id||answers[q.id]===undefined)return;
    const tgt=q.want?scoreWant:scoreHave;
    if(q.kind==="mood"){
      (answers[q.id]||[]).forEach(i=>{ tgt[MOODS[q.set][i][0]]+=1.2; });
    } else {
      const opts=qOpts(q);
      const sel=q.multi?(answers[q.id]||[]):[answers[q.id]];
      sel.forEach(i=>{
        const o=opts[i]; if(!o)return;
        if(o.w)Object.entries(o.w).forEach(([k,v])=>tgt[k]+=v);
        if(o.axis){ const ax=q.want?axisWant:axisHave; Object.entries(o.axis).forEach(([k,v])=>{ if(ax[k]!==undefined)ax[k]+=v; }); }
      });
    }
  });
  const axMap={warm:["romantic","energetic","gorgeous","classic"],cool:["pure","elegant","charisma","chic"],
               soft:["romantic","pure","elegant","energetic"],deep:["gorgeous","classic","charisma","chic"]};
  Object.entries(axisWant).forEach(([ax,v])=>{ axMap[ax].forEach(k=>scoreWant[k]+=v*0.8); });
  Object.entries(axisHave).forEach(([ax,v])=>{ axMap[ax].forEach(k=>scoreHave[k]+=v*0.8); });
}
function topTwo(sc){ return TKEYS.map(k=>[k,sc[k]]).sort((a,b)=>b[1]-a[1]); }
function prepExtra(){
  scoreAll();
  const rank=topTwo(scoreWant);
  const gap=rank[0][1]>0?(rank[0][1]-rank[1][1])/rank[0][1]:1;
  extraQ=[];
  if(gap<0.15){
    const pr=PAIRS.find(p=>p.pair.includes(rank[0][0])&&p.pair.includes(rank[1][0]));
    if(pr)extraQ.push({...pr,axis:"want"});
  }
  const hrank=topTwo(scoreHave);
  const hgap=hrank[0][1]>0?(hrank[0][1]-hrank[1][1])/hrank[0][1]:1;
  if(hgap<0.15){
    const pr=PAIRS.find(p=>p.pair.includes(hrank[0][0])&&p.pair.includes(hrank[1][0]));
    if(pr&&!extraQ.find(e=>e.q===pr.q))extraQ.push({...pr,axis:"have"});
  }
  if(extraQ.length){ phase="extra"; extraIdx=-1; renderExtraIntro(); }
  else { phase="result"; render(); }
}
function renderExtraIntro(){
  $("prog").classList.add("hidden");
  app.innerHTML=`<div class="card break-card"><div class="em">✨</div>
   <h2>결과가 거의 나왔어요!</h2>
   <p style="color:var(--sub);font-size:14px;margin:10px 0">더 정확한 분석을 위해<br><b>${extraQ.length}가지만</b> 더 여쭤볼게요</p>
   <button class="btn" onclick="extraIdx=0;render()">좋아요</button></div>`;
}
function renderExtra(){
  if(extraIdx>=extraQ.length){ phase="result"; render(); return; }
  const e=extraQ[extraIdx];
  $("prog").classList.add("hidden");
  app.innerHTML=`<div class="card"><div class="q-part">정밀 분석</div><h2>${e.q}</h2>
   <button class="opt" onclick="pickExtra(0)">${g(e.a)}</button>
   <button class="opt" onclick="pickExtra(1)">${g(e.b)}</button></div>`;
}
function pickExtra(i){
  const e=extraQ[extraIdx];
  (e.axis==="want"?scoreWant:scoreHave)[e.pair[i]]+=3;
  answers["E_"+extraIdx]=i;
  extraIdx++; render();
}
function renderResult(){
  $("prog").classList.add("hidden");
  const wr=topTwo(scoreWant), hr=topTwo(scoreHave);
  // ---- 진단 스냅샷 저장 (1회) ----
  if(!window.__diagSaved){
    window.__diagSaved = true;
    const durS = Math.round((Date.now()-startTs)/1000);
    sbInsert("diagnoses", {user_id:UID, app_version:"beta_v3", want_type:wr[0][0], have_type:hr[0][0],
      want_coord:{rank:wr.slice(0,3)}, have_coord:{rank:hr.slice(0,3)},
      gap: wr[0][0]===hr[0][0]?0:1, extra_used:extraQ.length, duration_sec:durS, answers:answers});
    track("diagnosis_completed",{want:wr[0][0], have:hr[0][0], extra:extraQ.length, dur:durS, gender:GENDER});
  }
  const W=TYPES[wr[0][0]], Hv=TYPES[hr[0][0]];
  const wTotal=wr.reduce((s,x)=>s+x[1],0)||1;
  const same=wr[0][0]===hr[0][0];
  const c5=Q.find(q=>q.id==="C5"), d1=Q.find(q=>q.id==="D1");
  const othersTag=answers["C5"]!==undefined?c5.opts[answers["C5"]].tag:null;
  const selfTag=answers["D1"]!==undefined?d1.opts[answers["D1"]].tag:null;
  const gapNote=(othersTag&&selfTag&&othersTag!==selfTag)?
    `<div class="sec"><h3>👀 재미있는 발견</h3><p>스스로는 "<b>${d1.opts[answers["D1"]].t}</b>"이라고 느끼시지만, 주변에서는 "<b>${c5.opts[answers["C5"]].t}</b>"라는 말을 듣고 계세요. 이 간극이 바로 스타일링의 힌트가 될 수 있어요!</p></div>`:"";
  const wStyle=GENDER==="m"?(W.styleM||W.style):W.style;
  const wKeep=GENDER==="m"?(W.keepM||W.keep):W.keep;
  const bridge=same?
    `<p>추구미와 지금의 무드가 <b>같은 방향</b>이에요! 이미 잘 가고 있어요. 지금 방향을 더 선명하게 다듬으면 돼요.</p>`:
    `<p>지금의 무드는 <b>${Hv.name}</b>, 되고 싶은 모습은 <b>${W.name}</b> — 이 <b>격차를 잇는 것</b>이 스타일링의 핵심이에요. ${W.name}의 컬러와 무드를 하나씩 더해보세요: <b>${wStyle}</b></p>`;
  let bars="";
  wr.slice(0,4).forEach(([k,v])=>{
    bars+=`<div class="bar-row"><span class="nm">${TYPES[k].name}</span><div class="bar-bg"><div class="bar-fg" style="width:${Math.round(v/wTotal*100*2.2)}%;background:${TYPES[k].color}"></div></div><span>${Math.round(v/wTotal*100)}%</span></div>`;
  });
  app.innerHTML=`<div class="card">
   <div style="text-align:center;margin-bottom:6px">
     <div style="display:inline-block;background:linear-gradient(135deg,${W.color},${shade(W.color)});width:52px;height:52px;border-radius:46% 54% 52% 48% / 55% 48% 52% 45%;box-shadow:0 4px 12px rgba(0,0,0,.12);position:relative">
       <span style="position:absolute;top:14px;left:12px;width:7px;height:7px;background:#2B2233;border-radius:50%"></span>
       <span style="position:absolute;top:14px;right:12px;width:7px;height:7px;background:#2B2233;border-radius:50%"></span>
       <span style="position:absolute;top:26px;left:50%;transform:translateX(-50%);width:10px;height:5px;border-bottom:2px solid #2B2233;border-radius:0 0 10px 10px"></span>
     </div>
     <p style="font-size:12.5px;color:var(--sub);margin-top:6px">구미가 결과를 가져왔어요</p>
   </div>
   <div class="q-part">나의 추구미</div>
   <div class="result-type" style="background:linear-gradient(135deg,${W.color},${shade(W.color)})">
     <div style="font-size:13px;opacity:.9">당신이 되고 싶은 모습은</div>
     <h2>${W.name}</h2><div class="pc">${W.pc} · ${g(W.one)}</div>
     <span class="tag">추구미</span></div>
   <div class="sec"><h3>🔍 추구미 분포</h3>${bars}</div>
   <div class="sec"><h3>💛 지금의 나</h3><p>현재 무드는 <b style="color:${Hv.color==='#3E3A45'?'#2B2233':Hv.color}">${Hv.name}</b>에 가까워요. ${g(Hv.desc)}</p></div>
   <div class="sec"><h3>🌉 방향 제안</h3>${bridge}</div>
   ${gapNote}
   <div class="sec"><h3>✨ ${W.name}에 다가가는 첫걸음</h3><p><b>유지·강화:</b> ${wKeep}<br><b>스타일:</b> ${wStyle}</p></div>
   <div class="sec"><h3>이 결과, 어땠나요?</h3>
     <div class="fb"><button id="fbY" onclick="fb(1)">👍 나 같아요</button><button id="fbN" onclick="fb(0)">🤔 갸우뚱해요</button></div>
     <div id="selfPickBox" style="display:none;margin-top:10px">
       <p style="font-size:13px;color:var(--sub);margin-bottom:8px">그렇다면, 스스로 생각하는 내 추구미는 뭐에 가까워요? <span style="font-weight:400">(선택)</span></p>
       <div class="chipgrid">${TKEYS.map(k=>`<div class="chip-item sp-chip" data-k="${k}" onclick="pickSelf('${k}')">${TYPES[k].name}</div>`).join("")}</div>
     </div>
     <textarea id="fbTxt" placeholder="추가하고 싶은 질문이나, 이상했던 문항이 있다면 알려주세요! (선택)"></textarea>
     <button class="btn" onclick="saveLog()">다음 — 피드백 남기기</button>
     <button class="btn ghost" onclick="location.reload()">처음부터 다시</button></div>
   <p class="small">추구미즘 베타 · 사진 진단이 더해지면 훨씬 정확해져요</p>
  </div>`;
  window._result={gender:GENDER,want:wr[0][0],wantRank:wr.slice(0,3),have:hr[0][0],extraUsed:extraQ.length};
}
let fbVal=null, selfPick=null;
function fb(v){
  fbVal=v; $("fbY").classList.toggle("sel",v===1); $("fbN").classList.toggle("sel",v===0);
  const box=$("selfPickBox"); if(box) box.style.display = (v===0) ? "block" : "none";
  track("result_feedback",{fb:v});
}
function pickSelf(k){
  selfPick=k;
  document.querySelectorAll(".sp-chip").forEach(c=>c.classList.toggle("sel", c.dataset.k===k));
  track("result_self_pick",{picked:k});
}
function saveLog(){
  const wr=topTwo(scoreWant), hr=topTwo(scoreHave);
  const durS = Math.round((Date.now()-startTs)/1000);
  // 응답 원자료 압축: "A1:0,2|B3:1|..." (폼 URL 길이 안전)
  const raw = Object.entries(answers).map(([k,v])=>k+":"+(Array.isArray(v)?v.join(","):v)).join("|")
    + (selfPick?"|SELF:"+selfPick:"") + (fbVal!==null?"|FB:"+fbVal:"") + "|TXT:"+($("fbTxt").value||"").slice(0,300);
  const log={ts:new Date().toISOString(),gender:GENDER,dur:durS,answers,result:window._result,fb:fbVal,selfPick,fbText:$("fbTxt").value||""};
  try{ const arr=JSON.parse(localStorage.getItem("aim_logs")||"[]"); arr.push(log); localStorage.setItem("aim_logs",JSON.stringify(arr)); }catch(e){}
  track("survey_submit",{fb:fbVal,selfPick,hasText:!!($("fbTxt").value)});
  // 구글폼 사전작성 링크 (결과 자동 입력)
  const formUrl = FORM_BASE
    + "&entry."+FORM_ENTRY.want+"="+encodeURIComponent(TYPES[wr[0][0]].name)
    + "&entry."+FORM_ENTRY.have+"="+encodeURIComponent(TYPES[hr[0][0]].name)
    + "&entry."+FORM_ENTRY.dur+"="+durS
    + "&entry."+FORM_ENTRY.gender+"="+(GENDER==="m"?"남":"여")
    + "&entry."+FORM_ENTRY.raw+"="+encodeURIComponent(raw.slice(0,1500));
  app.innerHTML=`<div class="card break-card"><div class="em">💌</div><h2>고마워요!</h2>
   <p style="color:var(--sub);font-size:14px;margin:10px 0;line-height:1.7">마지막으로 <b>피드백 1분</b>만 부탁해요.<br>결과는 자동으로 담겨 있어서, 세 가지만 답하면 끝나요.</p>
   <button class="btn" onclick="track('form_opened',{}); window.open('${formUrl}','_blank')">피드백 남기기 (1분)</button>
   <button class="btn ghost" onclick="location.reload()">처음부터 다시</button>
   <button class="btn ghost" onclick="adminExport()" style="margin-top:20px;opacity:.4">· · ·</button></div>`;
}
function adminExport(){ // 관리자: 이 기기의 누적 로그를 CSV로 다운로드
  const arr=JSON.parse(localStorage.getItem("aim_logs")||"[]");
  if(!arr.length){ alert("이 기기에 저장된 응답이 없습니다."); return; }
  const head=["시각","성별","소요초","추구미","현재무드","심화문항","만족","피드백","응답JSON"];
  const rows=arr.map(l=>[l.ts,l.gender,l.dur,l.result?.want||"",l.result?.have||"",l.result?.extraUsed||0,
    l.fb===1?"👍":l.fb===0?"🤔":"",(l.fbText||"").replace(/"/g,"'"),JSON.stringify(l.answers).replace(/"/g,"'")]);
  const csv="\uFEFF"+[head,...rows].map(r=>r.map(c=>`"${c}"`).join(",")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="추구미진단_응답로그.csv"; a.click();
}
render();
</script>
</body>
</html>
